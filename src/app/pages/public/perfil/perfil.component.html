<div class="perfil-layout">
  <h2>Mi Perfil - Gestión de Solicitudes</h2>

  <section class="card">
    <h3>Nueva Solicitud</h3>
    <div class="form-group">
      <textarea 
        [(ngModel)]="mensajeNuevo" 
        placeholder="Escribe aquí tu mensaje de interés..."
        class="input-texto">
      </textarea>
      <button (click)="enviarSolicitud()" class="btn-crear">
        Enviar Solicitud
      </button>
    </div>
  </section>

  <section class="lista-solicitudes">
    <h3>Mis Solicitudes Enviadas</h3>
    
    @for (s of misSolicitudes; track s._id) {
      <div class="item-solicitud">
        <div class="contenido">
          <p><strong>Mensaje:</strong> {{ s.message }}</p>
          <small>ID Oferta: {{ s.oferta }}</small>
        </div>
        <div class="acciones">
          <span class="badge" [attr.data-status]="s.status">{{ s.status }}</span>
        </div>
      </div>
    } @empty {
      <p class="aviso">No tienes solicitudes creadas todavía.</p>
    }
  </section>
</div>
