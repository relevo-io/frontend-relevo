<div class="admin-container admin-theme">
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-box">
        <span class="material-symbols-outlined">analytics</span>
      </div>
      <div class="brand">
        <h1>RELEVO</h1>
        <p>Consola de Administración</p>
      </div>
    </div>

    <nav class="nav-links">
      <a routerLink="dashboard" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined icon-fill">grid_view</span>
        <span>Dashboard</span>
      </a>
      <a routerLink="usuarios" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined icon-fill">badge</span>
        <span>Usuarios</span>
      </a>
      <a routerLink="ofertas" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined icon-fill">rocket_launch</span>
        <span>Ofertas</span>
      </a>
      <a routerLink="solicitudes" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined icon-fill">notifications_active</span>
        <span>Solicitudes</span>
      </a>
      
      <div class="nav-divider">Configuración</div>
      
      <a routerLink="settings" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined icon-fill">settings</span>
        <span>Ajustes</span>
      </a>
      
      <div class="nav-divider">Sistema</div>

      <a routerLink="/" class="nav-item">
        <span class="material-symbols-outlined icon-fill">public</span>
        <span>Web Principal</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="system-status tech-card">
        <div class="status-indicator">
          <span class="dot green"></span>
          <span class="status-text">Sistemas operativos</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="main-wrapper">
    <!-- Clean Top Header -->
    <header class="admin-header">
      <div class="header-left">
        <span class="breadcrumb-root">Admin</span>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Backoffice</span>
      </div>
      
      <div class="header-right">
        <button class="icon-btn">
          <span class="material-symbols-outlined">search</span>
        </button>
        <button class="icon-btn">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <div class="user-profile">
          <div class="user-info">
            <span class="name">Admin User</span>
            <span class="role">Super Admin</span>
          </div>
          <div class="avatar"></div>
        </div>
      </div>
    </header>

    <!-- CONTENT OUTLET -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
