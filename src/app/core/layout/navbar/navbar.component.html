<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a routerLink="/" class="logo">Relevo</a>
    </div>

    <div class="navbar-search">
      <span class="material-symbols-outlined">search</span>
      <input
        type="text"
        placeholder="Busca empresas por sector, region o descripcion"
        [ngModel]="searchQuery()"
        (ngModelChange)="onSearchInput($event)"
      />
    </div>

    <div class="navbar-actions">
      @if (authService.isLoggedIn()) {
        <a [routerLink]="getSessionActionRoute()" class="btn-outline">{{ getSessionActionLabel() }}</a>
        <button (click)="authService.logout()" class="btn-outline">Cerrar sesion</button>
      } @else {
        <button routerLink="/register" class="btn-outline">Registrate | Inicia sesion</button>
      }
      <button (click)="goToSell()" class="btn-solid">Vender ahora</button>
    </div>
  </div>
</nav>
